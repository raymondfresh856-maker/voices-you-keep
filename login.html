<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Voices You Keep™</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F0A1F 0%, #1F1345 100%);
            color: #F3F4F6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .auth-box {
            background: rgba(26, 19, 48, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            border: 1px solid rgba(107, 33, 168, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #F59E0B, #FCA5A5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #9CA3AF;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #D1D5DB;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 10, 31, 0.6);
            border: 1.5px solid rgba(107, 33, 168, 0.4);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: #F59E0B;
            background: rgba(15, 10, 31, 0.8);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .form-input::placeholder {
            color: #6B7280;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #6B21A8, #4C1D95);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(107, 33, 168, 0.5);
            background: linear-gradient(135deg, #7C3AED, #5B21B6);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 2rem 0 1.5rem;
            color: #6B7280;
            font-size: 0.875rem;
        }

        .toggle-text {
            text-align: center;
            margin-top: 1.5rem;
            color: #9CA3AF;
            font-size: 0.9rem;
        }

        .toggle-link {
            color: #F59E0B;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-link:hover {
            color: #FCA5A5;
            text-decoration: underline;
        }

        .message {
            padding: 0.875rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1.5px solid rgba(239, 68, 68, 0.4);
            color: #FCA5A5;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1.5px solid rgba(16, 185, 129, 0.4);
            color: #6EE7B7;
        }

        .message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            color: #9CA3AF;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s;
        }

        .back-home a:hover {
            color: #F59E0B;
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 2rem 1.5rem;
            }

            .logo {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h1 class="logo">Voices You Keep™</h1>
            <p class="subtitle" id="subtitle">Sign in to your account</p>

            <!-- Messages -->
            <div id="errorMessage" class="message error"></div>
            <div id="successMessage" class="message success"></div>

            <!-- Auth Form -->
            <form id="authForm" onsubmit="handleSubmit(event)">
                <!-- Name field (hidden by default) -->
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label class="form-label">Full Name</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="fullName" 
                        placeholder="John Doe"
                        autocomplete="name"
                    >
                </div>

                <!-- Email field -->
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email" 
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <!-- Password field -->
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        id="password" 
                        placeholder="Enter your password"
                        required
                        minlength="8"
                        autocomplete="current-password"
                    >
                </div>

                <!-- Submit button -->
                <button type="submit" class="btn-primary" id="submitBtn">
                    <span id="btnText">Sign In</span>
                </button>
            </form>

            <!-- Toggle between login/register -->
            <p class="toggle-text">
                <span id="toggleQuestion">Don't have an account?</span>
                <a class="toggle-link" id="toggleLink" onclick="toggleMode()">Create one</a>
            </p>

            <!-- Back to home -->
            <div class="back-home">
                <a href="/" onclick="goHome(event)">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = 'http://localhost:3001/api';
        let isRegisterMode = false;

        // Toggle between login and register
        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            
            const subtitle = document.getElementById('subtitle');
            const nameGroup = document.getElementById('nameGroup');
            const fullNameInput = document.getElementById('fullName');
            const btnText = document.getElementById('btnText');
            const toggleQuestion = document.getElementById('toggleQuestion');
            const toggleLink = document.getElementById('toggleLink');
            const passwordInput = document.getElementById('password');
            
            if (isRegisterMode) {
                // Switch to register mode
                subtitle.textContent = 'Create your account';
                nameGroup.style.display = 'block';
                fullNameInput.required = true;
                btnText.textContent = 'Create Account';
                toggleQuestion.textContent = 'Already have an account?';
                toggleLink.textContent = 'Sign in';
                passwordInput.autocomplete = 'new-password';
            } else {
                // Switch to login mode
                subtitle.textContent = 'Sign in to your account';
                nameGroup.style.display = 'none';
                fullNameInput.required = false;
                btnText.textContent = 'Sign In';
                toggleQuestion.textContent = "Don't have an account?";
                toggleLink.textContent = 'Create one';
                passwordInput.autocomplete = 'current-password';
            }
            
            // Clear messages
            hideMessages();
        }

        // Handle form submission
        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const originalText = btnText.textContent;
            
            // Disable button and show spinner
            submitBtn.disabled = true;
            btnText.innerHTML = `<span class="spinner"></span>`;
            
            // Clear messages
            hideMessages();
            
            // Get form data
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value.trim();
            
            // Validation
            if (isRegisterMode && !fullName) {
                showError('Please enter your full name');
                resetButton(submitBtn, btnText, originalText);
                return;
            }
            
            if (!email) {
                showError('Please enter your email');
                resetButton(submitBtn, btnText, originalText);
                return;
            }
            
            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                resetButton(submitBtn, btnText, originalText);
                return;
            }
            
            try {
                const endpoint = isRegisterMode ? '/auth/register' : '/auth/login';
                const payload = isRegisterMode 
                    ? { name: fullName, email, password }  // Backend expects 'name'
                    : { email, password };
                
                console.log(`Attempting ${isRegisterMode ? 'registration' : 'login'}...`);
                
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Save token and user data
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Show success message
                    showSuccess(isRegisterMode 
                        ? '✓ Account created successfully! Redirecting...'
                        : '✓ Login successful! Redirecting...'
                    );
                    
                    // Redirect to card creator
                    setTimeout(() => {
                        window.location.href = '/card-creator.html';
                    }, 1500);
                } else {
                    // Show error from server
                    showError(data.error || 'Authentication failed. Please try again.');
                    resetButton(submitBtn, btnText, originalText);
                }
            } catch (error) {
                console.error('Auth error:', error);
                showError('⚠️ Cannot connect to server. Make sure the backend is running at http://localhost:3001');
                resetButton(submitBtn, btnText, originalText);
            }
        }

        // Show error message
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // Show success message
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        // Hide all messages
        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // Reset button state
        function resetButton(btn, textEl, originalText) {
            btn.disabled = false;
            textEl.textContent = originalText;
        }

        // Go to home page
        function goHome(event) {
            event.preventDefault();
            window.location.href = '/index.html';
        }

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                // Already logged in, redirect to card creator
                console.log('User already logged in, redirecting...');
                window.location.href = '/card-creator.html';
            }
        });

        // Handle Enter key in form
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !document.getElementById('submitBtn').disabled) {
                e.preventDefault();
                document.getElementById('authForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
